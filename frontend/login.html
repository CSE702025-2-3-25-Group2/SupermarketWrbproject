<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Siêu Thị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow border-0" style="width: 100%; max-width: 400px; border-radius: 12px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">SIÊU THỊ POS</h3>
            <p class="text-muted text-center mb-4">Vui lòng đăng nhập hệ thống</p>
            
            <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Tài khoản</label>
                    <input type="text" class="form-control p-2.5" id="username" placeholder="Nhập tên đăng nhập..." required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <input type="password" class="form-control p-2.5" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100 p-2.5 fw-bold" style="border-radius: 8px;">
                    Đăng Nhập
                </button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
